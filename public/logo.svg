<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="XP Money logo">
  <!--
    XP Money — v2 (2026)
    Minimalist monogram: rounded-square emerald token with a geometric
    lightning bolt carved out as negative space. One shape, one gradient,
    full contrast. Designed to stay crisp from 1024px down to 16px favicon.
  -->
  <defs>
    <!-- Soft emerald gradient — subtle depth, not rainbow -->
    <linearGradient id="xpm_token" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>

    <!-- Bolt cutout mask: white = keep, black = cut -->
    <mask id="xpm_cut">
      <rect width="512" height="512" fill="#fff"/>
      <!--
        Bolt geometry — 30° consistent angles.
        Start top-right, cut down to mid, kick out, down to bottom-point,
        up to mid again, kick in, close.
      -->
      <path d="M 296 116
               L 172 272
               L 232 272
               L 216 396
               L 340 240
               L 280 240
               L 296 116 Z" fill="#000"/>
    </mask>
  </defs>

  <!-- Rounded-square token with bolt carved out -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112"
        fill="url(#xpm_token)"
        mask="url(#xpm_cut)"/>

  <!-- Single hairline inner stroke — adds crispness without clutter.
       At favicon sizes this vanishes, which is exactly what we want. -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112"
        fill="none"
        stroke="#ffffff"
        stroke-opacity="0.08"
        stroke-width="2"/>
</svg>
