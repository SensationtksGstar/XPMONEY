<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="XP Money logo">
  <defs>
    <!-- Outer rounded-square gradient: emerald coin edge -->
    <linearGradient id="xpm_ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="50%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0f5132"/>
    </linearGradient>

    <!-- Top half: bright emerald gradient -->
    <linearGradient id="xpm_top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Bottom half: deep navy with subtle depth -->
    <linearGradient id="xpm_bottom" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#0b1528"/>
      <stop offset="100%" stop-color="#060b14"/>
    </linearGradient>

    <!-- Central capsule: dark chrome -->
    <linearGradient id="xpm_capsule" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1b2536"/>
      <stop offset="100%" stop-color="#060b14"/>
    </linearGradient>

    <!-- Lightning bolt: energy gradient (green → lime → amber) -->
    <linearGradient id="xpm_bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d9f99d"/>
      <stop offset="40%"  stop-color="#a3e635"/>
      <stop offset="80%"  stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Highlight glint on coin edge -->
    <linearGradient id="xpm_glint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for the bolt -->
    <filter id="xpm_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ── Outer coin body (rounded square) ── -->
  <rect x="20" y="20" width="472" height="472" rx="128" ry="128" fill="url(#xpm_ring)"/>

  <!-- Inner inset (the "coin face") -->
  <rect x="44" y="44" width="424" height="424" rx="108" ry="108" fill="url(#xpm_bottom)"/>

  <!-- Top half emerald -->
  <path d="
    M 152 44
    H 360
    A 108 108 0 0 1 468 152
    V 244
    H 44
    V 152
    A 108 108 0 0 1 152 44 Z"
    fill="url(#xpm_top)"/>

  <!-- Subtle circuit grid on bottom half -->
  <g opacity="0.14" stroke="#22c55e" stroke-width="1.2" fill="none" stroke-linecap="round">
    <line x1="80"  y1="312" x2="200" y2="312"/>
    <line x1="312" y1="312" x2="432" y2="312"/>
    <line x1="80"  y1="380" x2="160" y2="380"/>
    <line x1="352" y1="380" x2="432" y2="380"/>
    <line x1="256" y1="300" x2="256" y2="360"/>
    <circle cx="100" cy="312" r="3" fill="#22c55e"/>
    <circle cx="412" cy="312" r="3" fill="#22c55e"/>
    <circle cx="100" cy="380" r="3" fill="#22c55e"/>
    <circle cx="412" cy="380" r="3" fill="#22c55e"/>
  </g>

  <!-- Sparkle stars on top half (pokémon energy feel) -->
  <g fill="#fde68a" opacity="0.95">
    <circle cx="96"  cy="100" r="3"/>
    <circle cx="120" cy="160" r="2"/>
    <circle cx="408" cy="120" r="3.5"/>
    <circle cx="384" cy="172" r="2"/>
    <path d="M 140 90 L 144 98 L 152 102 L 144 106 L 140 114 L 136 106 L 128 102 L 136 98 Z" opacity="0.75"/>
    <path d="M 372 96 L 376 104 L 384 108 L 376 112 L 372 120 L 368 112 L 360 108 L 368 104 Z" opacity="0.75"/>
  </g>

  <!-- Divider line (pokéball equator) -->
  <rect x="44" y="240" width="424" height="8" fill="#060b14"/>
  <rect x="44" y="240" width="424" height="2" fill="url(#xpm_ring)" opacity="0.6"/>

  <!-- Microchip notches on left/right edges -->
  <g fill="url(#xpm_ring)">
    <rect x="16" y="200" width="12" height="20" rx="2"/>
    <rect x="16" y="272" width="12" height="20" rx="2"/>
    <rect x="484" y="200" width="12" height="20" rx="2"/>
    <rect x="484" y="272" width="12" height="20" rx="2"/>
  </g>

  <!-- Central capsule (pokéball center button, but rounded-square) -->
  <rect x="180" y="184" width="152" height="120" rx="36" ry="36"
        fill="url(#xpm_capsule)"
        stroke="url(#xpm_ring)"
        stroke-width="6"/>

  <!-- Inner capsule inset -->
  <rect x="190" y="194" width="132" height="100" rx="28" ry="28"
        fill="#060b14"
        opacity="0.9"/>

  <!-- ── The lightning bolt (heart of the logo) ── -->
  <!-- Glow halo behind bolt -->
  <path d="
    M 272 196
    L 218 250
    L 252 250
    L 236 292
    L 298 230
    L 264 230
    L 280 196 Z"
    fill="url(#xpm_bolt)"
    opacity="0.35"
    filter="url(#xpm_glow)"/>

  <!-- Solid bolt -->
  <path d="
    M 272 196
    L 218 250
    L 252 250
    L 236 292
    L 298 230
    L 264 230
    L 280 196 Z"
    fill="url(#xpm_bolt)"/>

  <!-- Bolt inner highlight -->
  <path d="
    M 272 200
    L 226 248
    L 248 248
    L 240 284
    L 292 232
    L 268 232
    L 278 202 Z"
    fill="#ffffff"
    opacity="0.28"/>

  <!-- Top glint (chrome reflection) -->
  <path d="
    M 152 44
    H 360
    A 108 108 0 0 1 468 152
    V 160
    Q 256 100 44 160
    V 152
    A 108 108 0 0 1 152 44 Z"
    fill="url(#xpm_glint)"/>
</svg>
