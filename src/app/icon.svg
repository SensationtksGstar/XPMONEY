<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Coin body -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#ring)"/>

  <!-- Dark bottom half -->
  <rect x="5" y="5" width="54" height="54" rx="13" fill="#060b14"/>

  <!-- Emerald top half -->
  <path d="M 18 5 H 46 A 13 13 0 0 1 59 18 V 31 H 5 V 18 A 13 13 0 0 1 18 5 Z" fill="url(#top)"/>

  <!-- Divider -->
  <rect x="5" y="30" width="54" height="1.5" fill="#060b14"/>

  <!-- Lightning bolt -->
  <path d="M 36 16 L 24 32 L 32 32 L 28 48 L 40 30 L 32 30 L 38 16 Z" fill="url(#bolt)"/>
</svg>
